name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/central_comercial?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.23.1
          package-manager-cache: false

      - name: Enable Corepack
        run: corepack enable

      - name: Install pinned pnpm
        run: corepack install --global pnpm@11.17.0

      - name: Confirm toolchain
        run: |
          node --version
          test "$(pnpm --version)" = "11.17.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate monorepo
        run: pnpm verify

      - name: Install Playwright Chromium
        run: pnpm --filter @central-comercial/web exec playwright install --with-deps chromium

      - name: Run E2E
        run: pnpm e2e
